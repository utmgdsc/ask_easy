<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Course card - matches CourseViewer card -->
  <rect x="50" y="60" width="300" height="280" rx="6" fill="white" stroke="#4ade80" stroke-width="2.5"/>

  <!-- Top row: Video icon + LIVE badge -->
  <rect x="76" y="88" width="48" height="48" rx="6" fill="#f0fdf4"/>
  <!-- Video icon (simplified) -->
  <rect x="88" y="100" width="18" height="14" rx="2" fill="#22c55e"/>
  <polygon points="108,101 108,113 116,107" fill="#22c55e"/>

  <!-- LIVE badge top-right -->
  <rect x="254" y="88" width="68" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="272" cy="102" r="3" fill="#22c55e"/>
  <text x="296" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#15803d">LIVE</text>

  <!-- Course name - big and bold -->
  <text x="76" y="216" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#1c1917" letter-spacing="-0.02em">CSC108</text>

  <!-- Bottom divider -->
  <line x1="76" y1="268" x2="324" y2="268" stroke="#f5f5f4" stroke-width="2"/>

  <!-- Bottom row: Calendar + semester + Join arrow -->
  <!-- Calendar icon (simplified) -->
  <rect x="76" y="286" width="16" height="14" rx="2" fill="none" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="76" y1="291" x2="92" y2="291" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="81" y1="284" x2="81" y2="287" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="87" y1="284" x2="87" y2="287" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="100" y="299" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#a8a29e">Fall 2025</text>

  <!-- Join → -->
  <text x="268" y="299" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Join</text>
  <!-- Arrow icon -->
  <line x1="302" y1="293" x2="316" y2="293" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <polyline points="310,287 316,293 310,299" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>