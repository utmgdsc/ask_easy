<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Main container -->
  <rect x="60" y="70" width="280" height="260" rx="18" fill="#fafaf9" stroke="#e7e5e4" stroke-width="2"/>
  <!-- Header with session info -->
  <rect x="60" y="70" width="280" height="40" rx="18" fill="#f5f5f4"/>
  <rect x="60" y="92" width="280" height="18" fill="#f5f5f4"/>
  <circle cx="86" cy="90" r="5" fill="#ef4444"/>
  <text x="98" y="94" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ef4444">LIVE</text>
  <text x="200" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#57534e">CSC108 — Lecture 5</text>
  <!-- Student count -->
  <rect x="280" y="80" width="44" height="20" rx="10" fill="#dcfce7"/>
  <text x="302" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#16a34a">47 👤</text>
  <!-- Question from student -->
  <rect x="80" y="124" width="240" height="52" rx="10" fill="white" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="96" cy="142" r="8" fill="#e7e5e4"/>
  <text x="110" y="140" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#78716c">Student</text>
  <text x="110" y="156" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#44403c">Why does this loop run n+1 times?</text>
  <!-- Upvote -->
  <polygon points="300,132 306,142 294,142" fill="#16a34a"/>
  <text x="300" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">15</text>
  <!-- Professor reply -->
  <rect x="96" y="186" width="210" height="56" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="102" y="180" width="64" height="16" rx="8" fill="#16a34a"/>
  <text x="134" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Professor</text>
  <text x="110" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#44403c">Good catch! The condition checks</text>
  <text x="110" y="226" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#44403c">≤ instead of &lt;, so it includes n.</text>
  <!-- Mark resolved button -->
  <rect x="208" y="252" width="100" height="26" rx="8" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="258" y="269" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#16a34a">✓ Resolved</text>
  <!-- Answer mode toggle -->
  <rect x="80" y="296" width="240" height="24" rx="6" fill="#f5f5f4"/>
  <text x="200" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#78716c">Answer Mode: TAs Only  ·  Moderation Tools Available</text>
  <!-- Decorative -->
  <circle cx="44" cy="160" r="5" fill="#dcfce7"/>
  <circle cx="356" cy="240" r="7" fill="#dcfce7"/>
</svg>