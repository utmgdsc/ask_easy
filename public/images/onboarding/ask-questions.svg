<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Chat container -->
  <rect x="70" y="50" width="260" height="300" rx="18" fill="#fafaf9" stroke="#e7e5e4" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="70" y="50" width="260" height="44" rx="18" fill="#f5f5f4"/>
  <rect x="70" y="76" width="260" height="18" fill="#f5f5f4"/>
  <circle cx="92" cy="72" r="4" fill="#ef4444"/>
  <text x="104" y="76" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ef4444">LIVE</text>
  <text x="220" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#78716c">Q&amp;A</text>
  <!-- Question 1 -->
  <rect x="90" y="108" width="220" height="48" rx="10" fill="white" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="106" cy="132" r="10" fill="#f5f5f4"/>
  <text x="106" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#78716c">S</text>
  <text x="122" y="126" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#44403c">Can you go over that last</text>
  <text x="122" y="142" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#44403c">example one more time?</text>
  <!-- Upvote on Q1 -->
  <polygon points="292,120 298,130 286,130" fill="#16a34a"/>
  <text x="292" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">9</text>
  <!-- TA Reply to Q1 -->
  <rect x="106" y="164" width="194" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="112" y="158" width="26" height="14" rx="7" fill="#16a34a"/>
  <text x="125" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="white">TA</text>
  <text x="118" y="183" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#57534e">Sure! The key idea is that</text>
  <text x="118" y="197" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#57534e">each call reduces by half...</text>
  <!-- Question 2 -->
  <rect x="90" y="220" width="220" height="40" rx="10" fill="white" stroke="#e7e5e4" stroke-width="1.5"/>
  <circle cx="106" cy="240" r="10" fill="#f5f5f4"/>
  <text x="106" y="243" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#78716c">A</text>
  <text x="122" y="244" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#44403c">Is this on the midterm?</text>
  <polygon points="292,232 298,242 286,242" fill="#a8a29e"/>
  <text x="292" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#a8a29e">3</text>
  <!-- Input bar -->
  <rect x="90" y="276" width="180" height="36" rx="8" fill="white" stroke="#d6d3d1" stroke-width="1.5"/>
  <text x="104" y="298" font-family="system-ui, sans-serif" font-size="11" fill="#a8a29e">Ask a question...</text>
  <rect x="278" y="276" width="32" height="36" rx="8" fill="#16a34a"/>
  <text x="294" y="299" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">↑</text>
  <!-- Decorative -->
  <circle cx="50" cy="140" r="5" fill="#dcfce7"/>
  <circle cx="348" cy="280" r="7" fill="#dcfce7"/>
</svg>