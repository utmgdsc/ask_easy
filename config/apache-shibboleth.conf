# =============================================================================
# Apache Virtual Host — AskEasy + Shibboleth SP (University of Toronto)
#
# PREREQUISITES
# -------------
# 1. Ubuntu/Debian:
#      sudo apt install apache2 libapache2-mod-shib
#      sudo a2enmod shib proxy proxy_http proxy_wstunnel headers ssl rewrite
#
# 2. Configure /etc/shibboleth/shibboleth2.xml (see inline comments below).
#
# 3. Download the U of T metadata signing certificate:
#      sudo curl -o /etc/shibboleth/utorauth_metadata_verify.crt \
#        https://md.sso.utoronto.ca/certs/ut-md-signing.crt
#
# 4. Start the Shibboleth SP daemon:
#      sudo systemctl enable shibd
#      sudo systemctl start shibd
#
# 5. Fetch your SP metadata and email it to shib.admin@utoronto.ca:
#      curl https://your-domain.utoronto.ca/Shibboleth.sso/Metadata > sp-metadata.xml
#
# SHIBBOLETH2.XML HIGHLIGHTS
# --------------------------
# In /etc/shibboleth/shibboleth2.xml, make the following changes:
#
#   <!-- EntityID — choose a stable URL; need not be resolvable yet -->
#   <ApplicationDefaults entityID="https://sp.<department>.utoronto.ca/shibboleth"
#                        REMOTE_USER="utorid">
#
#   <!-- Point at the U of T IdP -->
#   <SSO entityID="https://idpz.utorauth.utoronto.ca/shibboleth">
#     SAML2
#   </SSO>
#
#   <!-- U of T IdP metadata -->
#   <MetadataProvider type="XML"
#     url="https://md.sso.utoronto.ca/mda/ut-idp-metadata.xml"
#     backingFilePath="/var/cache/shibboleth/ut-idp-metadata.xml"
#     reloadInterval="3600">
#     <MetadataFilter type="RequireValidUntil" maxValidityInterval="5184000"/>
#     <MetadataFilter type="Signature" verifyName="false"
#       certificate="/etc/shibboleth/utorauth_metadata_verify.crt"/>
#   </MetadataProvider>
#
# =============================================================================

<VirtualHost *:443>
    ServerName your-domain.utoronto.ca
    ServerAdmin webmaster@your-domain.utoronto.ca

    # ---------------------------------------------------------------------------
    # TLS — replace with your actual certificate paths
    # ---------------------------------------------------------------------------
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/your-domain.crt
    SSLCertificateKeyFile /etc/ssl/private/your-domain.key

    # ---------------------------------------------------------------------------
    # Shibboleth SP — handle /Shibboleth.sso/* internally (metadata, ACS, SLO)
    # ---------------------------------------------------------------------------
    <Location /Shibboleth.sso>
        AuthType None
        Require all granted
        SetHandler shib
    </Location>

    # ---------------------------------------------------------------------------
    # Require a valid Shibboleth session for all paths.
    # Apache will redirect the browser to the U of T IdP if there is no session.
    # ---------------------------------------------------------------------------
    <Location />
        AuthType shibboleth
        ShibRequestSetting requireSession 1
        Require shib-session

        # Forward the authenticated user's UTORid and other attributes to Next.js
        # as HTTP headers. The app reads these in /api/auth/session.
        RequestHeader set utorid         "%{utorid}e"         env=utorid
        RequestHeader set mail           "%{mail}e"           env=mail
        RequestHeader set cn             "%{cn}e"             env=cn
        RequestHeader set displayName    "%{displayName}e"    env=displayName
        RequestHeader set givenName      "%{givenName}e"      env=givenName
        RequestHeader set sn             "%{sn}e"             env=sn
    </Location>

    # ---------------------------------------------------------------------------
    # Health check — no auth needed so load balancers / monitors can reach it
    # ---------------------------------------------------------------------------
    <Location /api/health>
        AuthType None
        Require all granted
    </Location>

    # ---------------------------------------------------------------------------
    # Reverse proxy to Next.js (HTTP, port 3000)
    # ---------------------------------------------------------------------------
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ---------------------------------------------------------------------------
    # WebSocket upgrade for Socket.IO
    # ---------------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    # Logging
    ErrorLog  ${APACHE_LOG_DIR}/askeasy-error.log
    CustomLog ${APACHE_LOG_DIR}/askeasy-access.log combined
</VirtualHost>

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName your-domain.utoronto.ca
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>
